<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width: 120px; height: 120px;
    background: transparent;
    overflow: visible;
    -webkit-app-region: drag;
    user-select: none;
  }
  #wrap {
    width: 120px; height: 120px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  svg {
    position: absolute;
    width: 120px; height: 120px;
    -webkit-app-region: no-drag;
    cursor: pointer;
    overflow: visible;
  }

  /* Rings only rotate when speaking (fast) or awake (very slow) */
  .rcw  { transform-origin: 60px 60px; }
  .rccw { transform-origin: 60px 60px; }

  body.speaking .rcw  { animation: cw  1.8s linear infinite; }
  body.speaking .rccw { animation: ccw 2.6s linear infinite; }
  body.awake    .rcw  { animation: cw  16s  linear infinite; }
  body.awake    .rccw { animation: ccw 22s  linear infinite; }
  body.listening .rcw  { animation: cw  5s  linear infinite; }
  body.listening .rccw { animation: ccw 7s  linear infinite; }

  @keyframes cw  { to { transform: rotate(360deg);  } }
  @keyframes ccw { to { transform: rotate(-360deg); } }

  /* Segments flash only on speak */
  .seg { opacity: 0.2; }
  body.speaking .seg { animation: sf 0.3s step-end infinite; }
  .seg:nth-child(even) { animation-delay: 0.15s !important; }
  @keyframes sf { 0%,100%{opacity:0.85;} 50%{opacity:0.08;} }

  /* Gold arc glows on speak */
  .garc { opacity: 0.75; transition: opacity 0.3s; }
  body.speaking .garc { animation: gp 0.5s ease-in-out infinite alternate; filter: drop-shadow(0 0 3px #ffaa00); }
  @keyframes gp { from{opacity:0.55;} to{opacity:1;} }

  /* Core pulses */
  body.awake    #core { animation: cb 2.5s ease-in-out infinite; }
  body.speaking #core { animation: cs 0.4s ease-in-out infinite alternate; }
  body.listening #core { animation: cb 1s ease-in-out infinite; }
  @keyframes cb { 0%,100%{r:18px;} 50%{r:21px;} }
  @keyframes cs { from{r:16px;} to{r:22px;} }

  /* Dot markers pop on speak */
  .dot { opacity: 0.35; transition: opacity 0.3s; }
  body.speaking .dot { animation: dp 0.55s ease-in-out infinite alternate; }
  @keyframes dp { from{r:1.2px;opacity:0.35;} to{r:2.2px;opacity:1;} }

  /* Outer atmosphere glow — state-based */
  #atmo { transition: opacity 0.5s; opacity: 0; }
  body.awake    #atmo { opacity: 0.5; }
  body.speaking #atmo { opacity: 1; animation: ag 0.45s ease-in-out infinite alternate; }
  body.listening #atmo { opacity: 0.7; }
  @keyframes ag { from{r:56px;} to{r:60px;} }
</style>
</head>
<body class="standby">
<div id="wrap">
<svg viewBox="0 0 120 120" onclick="orbClicked()" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#0d2535"/>
    <stop offset="60%" stop-color="#061420"/>
    <stop offset="100%" stop-color="#020b12"/>
  </radialGradient>
  <radialGradient id="cg" cx="40%" cy="36%" r="60%">
    <stop offset="0%"   stop-color="#ccf4ff" id="cs0"/>
    <stop offset="28%"  stop-color="#00bbdd" id="cs1"/>
    <stop offset="65%"  stop-color="#004466"/>
    <stop offset="100%" stop-color="#001018"/>
  </radialGradient>
  <radialGradient id="gr" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#00eeff" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#00eeff" stop-opacity="0"/>
  </radialGradient>
  <!-- State-colored atmosphere -->
  <radialGradient id="atmoG" cx="50%" cy="50%" r="50%">
    <stop offset="60%"  stop-color="#00aacc" stop-opacity="0" id="atmoIn"/>
    <stop offset="100%" stop-color="#00aacc" stop-opacity="0.18" id="atmoOut"/>
  </radialGradient>
  <filter id="gl"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="sgl"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<!-- Atmosphere glow -->
<circle id="atmo" cx="60" cy="60" r="57" fill="url(#atmoG)"/>

<!-- Base -->
<circle cx="60" cy="60" r="55" fill="url(#bg)"/>

<!-- Outer border -->
<circle cx="60" cy="60" r="54" fill="none" stroke="#1a8faa" stroke-width="1.2" opacity="0.9"/>
<circle cx="60" cy="60" r="51" fill="none" stroke="#0a3d4d" stroke-width="0.5" opacity="0.5"/>

<!-- Tick marks -->
<g id="ticks"/>

<!-- Rotating outer dashed ring -->
<g class="rcw">
  <circle cx="60" cy="60" r="47" fill="none" stroke="#1066aa" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.5"/>
</g>

<!-- Middle solid ring -->
<circle cx="60" cy="60" r="42" fill="none" stroke="#0c6677" stroke-width="1.5" opacity="0.85"/>

<!-- Segment bars -->
<g id="segs"/>

<!-- Inner rotating dashed ring -->
<g class="rccw">
  <circle cx="60" cy="60" r="36" fill="none" stroke="#0d7788" stroke-width="1" stroke-dasharray="6 3 1 3" opacity="0.65"/>
</g>

<!-- Gold arc top-left -->
<g class="garc">
  <path d="M 27,31 A 36,36 0 0,1 60,24" fill="none" stroke="#ffaa00" stroke-width="2" stroke-linecap="round"/>
  <circle cx="30" cy="33" r="1.8" fill="#ffcc44"/>
  <circle cx="40" cy="26" r="1.2" fill="#ffcc44" opacity="0.8"/>
  <circle cx="51" cy="24" r="1.2" fill="#ffcc44" opacity="0.7"/>
</g>

<!-- Small counter arc bottom-right -->
<g class="garc" style="opacity:0.35">
  <path d="M 93,89 A 36,36 0 0,1 60,96" fill="none" stroke="#ffaa00" stroke-width="1.2" stroke-linecap="round"/>
</g>

<!-- Inner dark fill -->
<circle cx="60" cy="60" r="30" fill="#030d16"/>
<circle cx="60" cy="60" r="29" fill="none" stroke="#0a3040" stroke-width="0.8"/>

<!-- Dot markers -->
<g id="dots"/>

<!-- Core sphere -->
<circle id="core" cx="60" cy="60" r="18" fill="url(#cg)"/>

<!-- Core glow -->
<circle cx="60" cy="60" r="11" fill="url(#gr)" filter="url(#sgl)"/>

<!-- Glass shine -->
<ellipse cx="55" cy="54" rx="7" ry="4.5" fill="rgba(255,255,255,0.22)" transform="rotate(-18,55,54)"/>

<!-- Arc reactor center -->
<circle cx="60" cy="60" r="3.5" fill="white" opacity="0.88" filter="url(#gl)"/>
<circle cx="60" cy="60" r="2"   fill="#aaffee" filter="url(#gl)"/>

</svg>
</div>
<script>
const { ipcRenderer } = require('electron');

// Tick marks
const tg = document.getElementById('ticks');
for (let i = 0; i < 60; i++) {
  const a = (i/60)*360, rad = (a-90)*Math.PI/180;
  const maj = i%5===0, med = i%5===2||i%5===3;
  const outerR = 54, innerR = maj ? 49 : med ? 51 : 52;
  const l = document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1', 60+Math.cos(rad)*outerR); l.setAttribute('y1', 60+Math.sin(rad)*outerR);
  l.setAttribute('x2', 60+Math.cos(rad)*innerR); l.setAttribute('y2', 60+Math.sin(rad)*innerR);
  l.setAttribute('stroke', maj ? '#22aacc' : '#0a4050');
  l.setAttribute('stroke-width', maj ? '1.2' : '0.6');
  l.setAttribute('opacity', maj ? '1' : '0.45');
  tg.appendChild(l);
}

// Segment bars
const sg = document.getElementById('segs');
for (let i = 0; i < 20; i++) {
  const a = (i/20)*360-90, rad = a*Math.PI/180;
  const l = document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1', 60+Math.cos(rad)*37); l.setAttribute('y1', 60+Math.sin(rad)*37);
  l.setAttribute('x2', 60+Math.cos(rad)*42); l.setAttribute('y2', 60+Math.sin(rad)*42);
  l.setAttribute('stroke','#00ccee'); l.setAttribute('stroke-width','2');
  l.classList.add('seg'); sg.appendChild(l);
}

// Dot markers
const dg = document.getElementById('dots');
[0,45,90,135,180,225,270,315].forEach(deg => {
  const rad = (deg-90)*Math.PI/180;
  const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx', 60+Math.cos(rad)*29); c.setAttribute('cy', 60+Math.sin(rad)*29);
  c.setAttribute('r','1.5'); c.setAttribute('fill','#00ccee');
  c.classList.add('dot'); dg.appendChild(c);
});

// State colors
const ATMO = { standby:'#00aacc', awake:'#00ccee', listening:'#ffaa00', speaking:'#00ffcc' };

ipcRenderer.on('set-state', (_, state) => {
  document.body.className = state;
  // Update atmosphere color
  const col = ATMO[state] || '#00aacc';
  document.getElementById('atmoOut').setAttribute('stop-color', col);
  // Update core color
  if (state === 'speaking') {
    document.getElementById('cs1').setAttribute('stop-color','#00ddbb');
  } else if (state === 'listening') {
    document.getElementById('cs1').setAttribute('stop-color','#ddaa00');
  } else {
    document.getElementById('cs1').setAttribute('stop-color','#00bbdd');
  }
});

function orbClicked() { ipcRenderer.send('orb-clicked'); }
</script>
</body>
</html>
